<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="UTF-8" />
		<title>MST 演算法教學與動畫</title>
		<script src="https://unpkg.com/blockly/blockly.min.js"></script>
		<script src="https://unpkg.com/blockly/msg/zh-hant.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

		<style>
			body,
			html {
				margin: 0;
				padding: 0;
				font-family: sans-serif;
				height: 100vh;
				overflow: hidden;
				background: #fdfdfd;
			}
			.header {
				height: 60px;
				background: #fff;
				display: flex;
				align-items: center;
				padding: 0 20px;
				box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
				z-index: 10;
				position: relative;
			}
			.main {
				display: flex;
				height: calc(100vh - 60px);
			}
			#blocklyDiv {
				flex: 1;
				border-right: 1px solid #ddd;
			}
			#rightPanel {
				width: 450px;
				display: flex;
				flex-direction: column;
				background: #fff;
			}
			#cy {
				flex: 1;
				background: #fafafa;
			} /* 圖形區域 */
			.info-panel {
				height: 180px;
				padding: 15px;
				border-top: 1px solid #eee;
				overflow-y: auto;
				font-size: 14px;
				background: #fff;
			}
			.btn-run {
				background: #4caf50;
				color: white;
				border: none;
				padding: 10px 20px;
				border-radius: 5px;
				cursor: pointer;
				font-size: 16px;
				font-weight: bold;
			}
			.btn-run:hover {
				background: #45a049;
			}
			.status-badge {
				display: inline-block;
				padding: 2px 8px;
				border-radius: 10px;
				font-size: 12px;
				margin-left: 10px;
			}
			.log-entry {
				margin-bottom: 5px;
				border-left: 3px solid #ccc;
				padding-left: 8px;
			}
		</style>
	</head>
	<body>
		<div class="header">
			<div style="flex: 1"><strong>Kruskal's MST 教學平台</strong></div>
			<div id="weightDisplay" style="margin-right: 20px; color: #666">
				MST 總權重: 0
			</div>
			<button class="btn-run" onclick="startMSTAnimation()">▶ 執行動畫</button>
		</div>

		<div class="main">
			<div id="blocklyDiv"></div>
			<div id="rightPanel">
				<div id="cy"></div>
				<div class="info-panel" id="log">
					<strong>執行日誌：</strong>
					<div id="logContent">等待使用者執行積木...</div>
				</div>
			</div>
		</div>

		<xml id="toolbox" style="display: none">
			<category name="邏輯" colour="#FFBF00"
				><block type="mst_start"></block
			></category>
			<category name="預處理" colour="#4C97FF"
				><block type="mst_input"></block><block type="mst_sort"></block
			></category>
			<category name="迴圈檢測" colour="#FFAB19"
				><block type="mst_loop"
					><statement name="DO"
						><block type="mst_check"></block></statement></block
			></category>
			<category name="執行輸出" colour="#0FBD8C"
				><block type="mst_connect"></block><block type="mst_output"></block
			></category>
		</xml>

		<script>
			// --- 1. 定義自訂積木 (與您截圖邏輯一致) ---
			Blockly.defineBlocksWithJsonArray([
				{
					type: "mst_start",
					message0: "當點擊執行",
					nextStatement: null,
					colour: "#FFBF00",
				},
				{
					type: "mst_input",
					message0: "讀取圖形資料並準備好並查集工具",
					previousStatement: null,
					nextStatement: null,
					colour: "#4C97FF",
				},
				{
					type: "mst_sort",
					message0: "將所有邊依照權重「由小到大」排序",
					previousStatement: null,
					nextStatement: null,
					colour: "#4C97FF",
				},
				{
					type: "mst_loop",
					message0: "取出排序好的每一條邊 (u, v) %1 %2",
					args0: [
						{ type: "input_dummy" },
						{ type: "input_statement", name: "DO" },
					],
					previousStatement: null,
					nextStatement: null,
					colour: "#FFAB19",
				},
				{
					type: "mst_check",
					message0: "如果 u 和 v 尚未連通 (不會形成環) %1 %2",
					args0: [
						{ type: "input_dummy" },
						{ type: "input_statement", name: "DO" },
					],
					previousStatement: null,
					colour: "#FFAB19",
				},
				{
					type: "mst_connect",
					message0: "將這條邊連起來加入 MST",
					previousStatement: null,
					colour: "#0FBD8C",
				},
				{
					type: "mst_output",
					message0: "輸出 MST 結果",
					previousStatement: null,
					colour: "#0FBD8C",
				},
			]);

			// --- 2. 初始化 Blockly ---
			const workspace = Blockly.inject("blocklyDiv", {
				toolbox: document.getElementById("toolbox"),
				theme: Blockly.Themes.Modern,
			});

			// --- 3. 初始化 Cytoscape 測資圖形 ---
			const cy = cytoscape({
				container: document.getElementById("cy"),
				elements: [
					{ data: { id: "A" } },
					{ data: { id: "B" } },
					{ data: { id: "C" } },
					{ data: { id: "D" } },
					{ data: { id: "E" } },
					{ data: { id: "AB", source: "A", target: "B", weight: 4 } },
					{ data: { id: "BC", source: "B", target: "C", weight: 1 } },
					{ data: { id: "CD", source: "C", target: "D", weight: 3 } },
					{ data: { id: "DA", source: "D", target: "A", weight: 7 } },
					{ data: { id: "AC", source: "A", target: "C", weight: 2 } },
					{ data: { id: "BE", source: "B", target: "E", weight: 5 } },
					{ data: { id: "CE", source: "C", target: "E", weight: 8 } },
				],
				style: [
					{
						selector: "node",
						style: {
							label: "data(id)",
							"background-color": "#666",
							color: "#fff",
							"text-valign": "center",
							"text-halign": "center",
						},
					},
					{
						selector: "edge",
						style: {
							label: "data(weight)",
							width: 3,
							"line-color": "#ccc",
							"target-arrow-shape": "none",
							"curve-style": "bezier",
						},
					},
				],
				layout: { name: "circle" },
			});

			// --- 4. 演算法動畫邏輯 (Union-Find) ---
			let parent = {};
			function find(i) {
				return parent[i] === i ? i : (parent[i] = find(parent[i]));
			}
			function union(i, j) {
				parent[find(i)] = find(j);
			}

			async function startMSTAnimation() {
				// 重置
				document.getElementById("logContent").innerHTML = "";
				document.getElementById("weightDisplay").innerText = "MST 總權重: 0";
				let totalWeight = 0;
				cy.edges().style({ "line-color": "#ccc", width: 3 });

				const nodes = cy.nodes().map((n) => n.id());
				nodes.forEach((n) => (parent[n] = n));

				// 取得所有邊並排序
				let edges = cy.edges().map((e) => ({
					id: e.id(),
					u: e.data("source"),
					v: e.data("target"),
					w: e.data("weight"),
					ele: e,
				}));
				edges.sort((a, b) => a.w - b.w);

				log("1. 讀取測資成功，初始化並查集。");
				log("2. 邊排序結果: " + edges.map((e) => e.w).join(", "));

				for (let edge of edges) {
					// 動畫：檢查中
					edge.ele.animate(
						{ style: { "line-color": "#FFD700", width: 6 } },
						{ duration: 500 },
					);
					await new Promise((r) => setTimeout(r, 600));

					let rootU = find(edge.u);
					let rootV = find(edge.v);

					if (rootU !== rootV) {
						// 不成環，加入
						union(edge.u, edge.v);
						totalWeight += edge.w;
						edge.ele.style({ "line-color": "#4CAF50", width: 6 });
						document.getElementById("weightDisplay").innerText =
							"MST 總權重: " + totalWeight;
						log(
							`✔ 邊 ${edge.u}-${edge.v} (w:${edge.w}) 無環，加入 MST。`,
							"#4CAF50",
						);
					} else {
						// 成環，捨棄
						edge.ele.animate(
							{ style: { "line-color": "#FF5252", width: 2 } },
							{ duration: 300 },
						);
						log(
							`✘ 邊 ${edge.u}-${edge.v} (w:${edge.w}) 會造成環，捨棄。`,
							"#FF5252",
						);
					}
					await new Promise((r) => setTimeout(r, 800));
				}
				log("<b>演算法執行完畢！</b>", "#000");
			}

			function log(msg, color = "#666") {
				const content = document.getElementById("logContent");
				content.innerHTML += `<div class="log-entry" style="border-color:${color}; color:${color}">${msg}</div>`;
				content.scrollTop = content.scrollHeight;
			}
		</script>
	</body>
</html>
