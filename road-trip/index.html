<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>s l o w &nbsp; d r i v e</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --sr-white:       #F4F2ED;
  --sr-white-0:     #F4F2ED00;
  --sr-white-25:    #F4F2ED40;
  --sr-white-50:    #F4F2ED80;
  --sr-white-75:    #F4F2EDC0;
  --sr-white-90:    #F4F2EDE6;
  --sr-primary:     #343c3e;
  --sr-primary-0:   #343c3e00;
  --sr-primary-25:  #343c3e40;
  --sr-primary-50:  #343c3e80;
  --sr-primary-75:  #343c3ec0;
  --sr-secondary:   #D2D1CD;
  --sr-tertiary:    #7e7c76;
  --sr-warn:        #ff992b;
  --sr-bg:          #F4F2ED;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Space Grotesk', Helvetica, sans-serif; color:var(--sr-primary); }
canvas { display:block; }

/* ── HUD SHELL ── */
#hud { position:fixed; inset:0; pointer-events:none; }

/* ── SPEED ── */
#speedometer {
  position:absolute; bottom:2rem; right:2rem;
  font-family:'Space Mono', monospace;
  color:var(--sr-white);
  text-align:right;
  text-shadow:0 1px 8px rgba(0,0,0,.5);
}
#speed-num { font-size:3rem; font-weight:400; letter-spacing:-.05em; line-height:1; }
#speed-unit { font-size:.75rem; opacity:.55; letter-spacing:.15em; }

/* ── INVENTORY ── */
#inv-bar {
  position:absolute; bottom:2rem; left:50%; transform:translateX(-50%);
  display:flex; gap:.5rem;
}
.slot {
  width:62px; height:62px;
  background:var(--sr-white-25);
  border:1px solid var(--sr-white-50);
  border-radius:.75rem;
  -webkit-backdrop-filter:blur(.5rem);
  backdrop-filter:blur(.5rem);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
}
.slot .ico { font-size:1.5rem; line-height:1; }
.slot .cnt { font-size:.7rem; color:var(--sr-white); opacity:.8; font-family:'Space Mono',monospace; }

/* ── QUESTS ── */
#quests {
  position:absolute; top:1.25rem; right:1.25rem;
  background:var(--sr-white-50);
  border:1px solid var(--sr-primary-25);
  border-radius:.75rem;
  -webkit-backdrop-filter:blur(1rem);
  backdrop-filter:blur(1rem);
  padding:.85rem 1.1rem;
  min-width:200px;
  color:var(--sr-primary);
}
#quests h3 {
  font-size:.7rem; font-weight:500; letter-spacing:.12em;
  text-transform:uppercase; opacity:.6; margin-bottom:.6rem;
}
.q-item { font-size:.8rem; font-weight:300; margin:.35rem 0; opacity:.85; line-height:1.4; }

/* ── UPGRADES ── */
#upgrades {
  position:absolute; top:1.25rem; left:1.25rem;
  font-size:.7rem; font-weight:300; letter-spacing:.05em;
  color:var(--sr-white); opacity:.5;
  text-shadow:0 1px 4px rgba(0,0,0,.5);
  line-height:2;
}

#run-meta {
  position:absolute; top:1.25rem; left:50%; transform:translateX(-50%);
  font-size:.7rem; font-weight:300; letter-spacing:.08em;
  color:var(--sr-white); opacity:.72;
  text-shadow:0 1px 4px rgba(0,0,0,.55);
  text-align:center; line-height:1.8;
  background:var(--sr-primary-25);
  border:1px solid var(--sr-white-25);
  border-radius:.75rem;
  padding:.35rem .75rem;
  -webkit-backdrop-filter:blur(.4rem);
  backdrop-filter:blur(.4rem);
}

/* ── INTERACT PROMPT ── */
#interact-prompt {
  position:absolute; bottom:5.8rem; left:50%; transform:translateX(-50%);
  background:var(--sr-white-75);
  border:1px solid var(--sr-primary-25);
  border-radius:2rem;
  -webkit-backdrop-filter:blur(.5rem);
  backdrop-filter:blur(.5rem);
  padding:.5rem 1.4rem;
  font-size:.85rem; font-weight:400;
  color:var(--sr-primary);
  display:none; white-space:nowrap;
}
#interact-prompt kbd {
  font-family:'Space Mono',monospace;
  background:var(--sr-primary-25);
  padding:.1em .4em; border-radius:.25em;
}

/* ── CONTROLS HINT ── */
#controls {
  position:absolute; bottom:5.8rem; left:1.5rem;
  font-size:.7rem; font-weight:300; letter-spacing:.05em;
  color:var(--sr-white); opacity:.4;
  line-height:2; text-shadow:0 1px 4px rgba(0,0,0,.5);
}

/* ── NOTIFICATION ── */
#notif {
  position:fixed; top:42%; left:50%; transform:translate(-50%,-50%);
  background:var(--sr-white-90);
  border:1px solid var(--sr-primary-25);
  border-radius:2rem;
  -webkit-backdrop-filter:blur(1rem);
  backdrop-filter:blur(1rem);
  padding:.65rem 1.8rem;
  font-size:1rem; font-weight:400;
  color:var(--sr-primary);
  pointer-events:none; opacity:0;
  transition:opacity .4s;
  z-index:9999;
}

#kpi-panel {
  position:fixed; left:1.25rem; bottom:8.5rem;
  background:var(--sr-white-90);
  border:1px solid var(--sr-primary-25);
  border-radius:.75rem;
  padding:.75rem .9rem;
  min-width:220px;
  font-size:.72rem; line-height:1.6;
  color:var(--sr-primary);
  -webkit-backdrop-filter:blur(.75rem);
  backdrop-filter:blur(.75rem);
  display:none;
  z-index:9998;
}

#challenge-panel {
  position:fixed; right:1.25rem; bottom:8.5rem;
  background:var(--sr-white-90);
  border:1px solid var(--sr-primary-25);
  border-radius:.75rem;
  padding:.75rem .9rem;
  min-width:260px;
  font-size:.72rem; line-height:1.55;
  color:var(--sr-primary);
  -webkit-backdrop-filter:blur(.75rem);
  backdrop-filter:blur(.75rem);
  display:none;
  z-index:9998;
}

#fatal-overlay {
  position:fixed; inset:0;
  background:rgba(12,16,18,.88);
  color:var(--sr-white);
  display:none;
  align-items:center; justify-content:center;
  z-index:10020;
  padding:1.2rem;
  text-align:center;
}
#fatal-overlay .fatal-box {
  background:rgba(244,242,237,.08);
  border:1px solid var(--sr-white-25);
  border-radius:.85rem;
  padding:1rem 1.2rem;
  max-width:540px;
  line-height:1.6;
}
#sys-actions {
  position:fixed; top:1rem; right:1rem;
  z-index:10010;
  display:flex; gap:.4rem;
}
.sys-btn {
  pointer-events:all;
  background:var(--sr-white-50);
  border:1px solid var(--sr-primary-25);
  color:var(--sr-primary);
  border-radius:.5rem;
  padding:.3rem .6rem;
  font-size:.68rem;
  cursor:pointer;
}

/* ── MINIGAME OVERLAY ── */
#mg-overlay {
  position:absolute; inset:0;
  background:var(--sr-primary-50);
  -webkit-backdrop-filter:blur(.5rem);
  backdrop-filter:blur(.5rem);
  display:none; align-items:center; justify-content:center;
  pointer-events:all;
}

/* ── MINIGAME PANEL ── */
.mg-panel {
  background:var(--sr-white-90);
  border:1px solid var(--sr-primary-25);
  border-radius:1rem;
  -webkit-backdrop-filter:blur(2rem);
  backdrop-filter:blur(2rem);
  padding:2rem 2.5rem;
  min-width:380px;
  color:var(--sr-primary);
  text-align:center;
}
.mg-panel h2 { font-size:1.3rem; font-weight:500; letter-spacing:.05em; margin-bottom:.3rem; }
.mg-panel p  { font-size:.8rem; font-weight:300; opacity:.6; margin-bottom:1.2rem; }

.mg-status { font-size:.9rem; font-weight:300; min-height:1.2rem; margin:.5rem 0; color:var(--sr-primary); opacity:.8; }
.mg-result { font-size:.95rem; font-weight:500; min-height:1.4rem; margin:.4rem 0; }

/* ── PROGRESS BAR ── */
.bar-wrap {
  width:100%; height:32px;
  background:var(--sr-primary-25);
  border-radius:1rem; overflow:hidden;
  position:relative; margin:.75rem 0;
}
.bar-fill { height:100%; border-radius:1rem; transition:none; }
.bar-zone {
  position:absolute; top:0; height:100%;
  background:rgba(80,160,80,.35);
  pointer-events:none;
}
.bar-cursor {
  position:absolute; top:0; width:4px; height:100%;
  background:var(--sr-primary); border-radius:2px;
  pointer-events:none;
}

/* ── BUTTONS ── */
.mg-close {
  margin-top:1.4rem; padding:.6rem 1.8rem;
  background:var(--sr-primary-25);
  color:var(--sr-primary);
  border:1px solid var(--sr-primary-25);
  border-radius:2rem; cursor:pointer;
  font-size:.8rem; font-weight:400; letter-spacing:.08em;
  font-family:'Space Grotesk',Helvetica,sans-serif;
  transition:background .1s; pointer-events:all;
}
.mg-close:hover { background:var(--sr-primary-50); }

.camp-btn {
  width:100%; padding:.85rem 1rem;
  background:var(--sr-primary-0);
  color:var(--sr-primary);
  border:1px solid var(--sr-primary-25);
  border-radius:.75rem; cursor:pointer;
  font-size:.82rem; font-weight:400; text-align:left;
  margin:.3rem 0; font-family:'Space Grotesk',Helvetica,sans-serif;
  transition:background .1s; pointer-events:all; line-height:1.5;
}
.camp-btn:not(:disabled):hover { background:var(--sr-primary-25); }
.camp-btn:disabled { opacity:.35; cursor:not-allowed; }
.camp-btn small { font-size:.72rem; opacity:.6; display:block; margin-top:.1rem; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="speedometer">
    <div id="speed-num">0</div>
    <div id="speed-unit">km/h</div>
  </div>

  <div id="inv-bar">
    <div class="slot"><span class="ico">🪵</span><span class="cnt" id="n-wood">0</span></div>
    <div class="slot"><span class="ico">🐟</span><span class="cnt" id="n-fish">0</span></div>
    <div class="slot"><span class="ico">🍖</span><span class="cnt" id="n-food">0</span></div>
    <div class="slot"><span class="ico">🪨</span><span class="cnt" id="n-stone">0</span></div>
  </div>

  <div id="quests">
    <h3>任務</h3>
    <div id="quest-list"></div>
  </div>

  <div id="upgrades"></div>
  <div id="run-meta"></div>
  <div id="interact-prompt"></div>

  <div id="controls">
    W / ↑ &nbsp; 加速<br>
    S / ↓ &nbsp; 煞車<br>
    A D / ← → &nbsp; 轉向<br>
    E &nbsp; 互動<br>
    1 2 3 &nbsp; 玩家旅程<br>
    J &nbsp; 操控預設<br>
    7 8 9 &nbsp; 測試路段<br>
    F2 &nbsp; KPI 面板<br>
    F3 &nbsp; 挑戰面板<br>
    F4 &nbsp; 匯出手感測試 CSV<br>
    F5 &nbsp; 匯出 KPI CSV
  </div>

  <div id="mg-overlay"></div>
</div>
<div id="notif"></div>
<div id="kpi-panel"></div>
<div id="challenge-panel"></div>
<div id="sys-actions">
  <button class="sys-btn" id="btn-export-kpi">匯出 KPI</button>
  <button class="sys-btn" id="btn-reset-save">重置存檔</button>
</div>
<div id="fatal-overlay"><div class="fatal-box" id="fatal-box"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script src="assets/alea.min.js"></script>
<script>
'use strict';

// ─── STATE ───────────────────────────────────────────────────────────────────
const G = {
  inv: { wood:0, fish:0, food:0, stone:0 },
  up:  { speed:1.0, axe:1, rod:1 },
  camped: false,
  nearPOI: null,
  inMG: false,
  journey: 'relax',
  drivePreset: 'balanced',
  driveAB: Math.random()<.5 ? 'A' : 'B',
  pulseClock: 0,
  autosaveClock: 0,
  nextPulseAt: 120 + Math.random()*120,
  scenic: 0,
  journeyXP: 0,
  lvl: 1,
  kpiOpen: false,
  challengeOpen: false,
  wallet: { coins:0, scrap:0 },
  growth: { handling:1, efficiency:1, style:1 },
  pity: { fishFail:0, chopMiss:0, mineMiss:0 },
  missionStats: { microDone:0, midDone:0, weeklyDone:0 },
  trackTest: {
    mode: 'none',
    running: false,
    elapsed: 0,
    target: 60,
    steeringSamples: [],
    speedSamples: [],
    hardBrakeCount: 0,
    offroadCount: 0,
    score: null,
  },
  driveTestHistory: [],
  recommendedPreset: 'balanced',
  tuning: { rewardPulseSecMin:120, rewardPulseSecMax:240 },
  economyCfg: {
    woodToCoins:18,
    stoneToCoins:22,
    upgradeBaseCost:45,
    pulseCoinBase:5,
  },
  physics: { lastHitAt:0, hitCount:0 },
  challenge: {
    weeklySeed: new Date().toISOString().slice(0,10),
    active: [],
  },
  session: {
    startedAt: Date.now(),
    distanceKm: 0,
    pulses: 0,
    shares: 0,
    journeysSwitched: 0,
    presetsSwitched: 0,
    poiInteractions: 0,
    questsDone: 0,
    events: [],
    challengeDone: 0,
  },
};

const JOURNEYS = {
  relax: {
    label:'放鬆型',
    pulseMin:130,
    pulseMax:230,
    pulseReward(){ G.inv.food+=1; G.scenic+=2; notif('旅途補給：烤魚 +1'); },
  },
  collect: {
    label:'收集型',
    pulseMin:110,
    pulseMax:190,
    pulseReward(){ G.inv.wood+=2; G.inv.stone+=1; notif('採集加成：木材 +2 / 石頭 +1'); },
  },
  challenge: {
    label:'挑戰型',
    pulseMin:100,
    pulseMax:170,
    pulseReward(){ G.up.speed=Math.min(3,G.up.speed+.05); G.scenic+=1; notif('熱身完成：臨時引擎微增幅'); },
  },
};

const DRIVE_PRESETS = {
  casual:{label:'休閒',accel:14,brake:20,drag:3.4,steer:1.35,reverse:-8},
  balanced:{label:'平衡',accel:16,brake:22,drag:2.8,steer:1.6,reverse:-10},
  pro:{label:'進階',accel:19,brake:24,drag:2.2,steer:1.95,reverse:-12},
};

const TRACK_TEST_MODES = {
  straight: {label:'直線高速', targetAvgKmh:92, maxSteerDelta:0.12, minKmh:60},
  curves: {label:'連續彎道', targetAvgKmh:66, maxSteerDelta:0.22, minKmh:35},
  hills: {label:'混合起伏', targetAvgKmh:72, maxSteerDelta:0.18, minKmh:45},
};

const MISSION_POOL = {
  micro: [
    { id:'m_wood3', icon:'🪵', text:'收集 3 木材', weight:5, check:()=>G.inv.wood>=3, reward(){ G.wallet.coins+=12; G.wallet.scrap+=1; notif('微任務完成：硬幣 +12'); } },
    { id:'m_fish2', icon:'🐟', text:'釣到 2 條魚', weight:5, check:()=>G.inv.fish>=2, reward(){ G.wallet.coins+=12; G.inv.food+=1; notif('微任務完成：硬幣 +12 / 食物 +1'); } },
    { id:'m_stone3', icon:'🪨', text:'收集 3 石頭', weight:4, check:()=>G.inv.stone>=3, reward(){ G.wallet.coins+=10; G.wallet.scrap+=2; notif('微任務完成：硬幣 +10'); } },
    { id:'m_drive1k', icon:'🛣️', text:'行駛 1.0 km', weight:4, check:()=>G.session.distanceKm>=1.0, reward(){ G.wallet.coins+=14; notif('微任務完成：巡航獎勵 +14'); } },
    { id:'m_food2', icon:'🍖', text:'烤出 2 份食物', weight:3, check:()=>G.inv.food>=2, reward(){ G.wallet.coins+=11; notif('微任務完成：補給掌握 +11'); } },
    { id:'m_poi3', icon:'📍', text:'完成 3 次互動', weight:3, check:()=>G.session.poiInteractions>=3, reward(){ G.wallet.coins+=13; notif('微任務完成：探索 +13'); } },
  ],
  mid: [
    { id:'d_wood10', icon:'🪵', text:'收集 10 木材', weight:4, check:()=>G.inv.wood>=10, reward(){ G.up.axe=Math.min(3,G.up.axe+1); G.wallet.coins+=35; notif('中任務完成：斧頭升級 + 硬幣'); } },
    { id:'d_fish8', icon:'🐟', text:'釣到 8 條魚', weight:4, check:()=>G.inv.fish>=8, reward(){ G.up.rod=Math.min(3,G.up.rod+1); G.wallet.coins+=35; notif('中任務完成：釣竿升級 + 硬幣'); } },
    { id:'d_pulses3', icon:'✨', text:'觸發 3 次旅程回饋', weight:3, check:()=>G.session.pulses>=3, reward(){ G.up.speed=Math.min(3,G.up.speed+.25); G.wallet.coins+=30; notif('中任務完成：車速提升'); } },
    { id:'d_poi6', icon:'📍', text:'完成 6 次互動', weight:3, check:()=>G.session.poiInteractions>=6, reward(){ G.wallet.coins+=32; G.wallet.scrap+=3; notif('中任務完成：探索達人'); } },
    { id:'d_coins160', icon:'🪙', text:'累積 160 硬幣', weight:3, check:()=>G.wallet.coins>=160, reward(){ G.growth.efficiency=Math.min(5,G.growth.efficiency+1); G.wallet.coins+=20; notif('中任務完成：效率成長'); } },
    { id:'d_shares3', icon:'📸', text:'記錄 3 次分享點', weight:2, check:()=>G.session.shares>=3, reward(){ G.growth.style=Math.min(5,G.growth.style+1); G.wallet.coins+=28; notif('中任務完成：風格成長'); } },
  ],
  weekly: [
    { id:'w_drive12k', icon:'🏁', text:'本週行駛 12 km', weight:3, check:()=>G.session.distanceKm>=12, reward(){ G.growth.style=Math.min(5,G.growth.style+1); G.wallet.coins+=120; notif('週任務完成：風格階級提升'); } },
    { id:'w_quest10', icon:'📜', text:'本週完成 10 任務', weight:3, check:()=>G.session.questsDone>=10, reward(){ G.growth.efficiency=Math.min(5,G.growth.efficiency+1); G.wallet.coins+=120; notif('週任務完成：效率階級提升'); } },
    { id:'w_share4', icon:'📸', text:'本週記錄 4 次分享點', weight:2, check:()=>G.session.shares>=4, reward(){ G.growth.handling=Math.min(5,G.growth.handling+1); G.wallet.coins+=120; notif('週任務完成：操控階級提升'); } },
    { id:'w_pulse10', icon:'✨', text:'本週觸發 10 次旅程回饋', weight:2, check:()=>G.session.pulses>=10, reward(){ G.wallet.coins+=140; G.wallet.scrap+=6; notif('週任務完成：節奏掌握者'); } },
  ],
};

function logEvent(type,payload={}){
  G.session.events.push({atSec:Math.round((Date.now()-G.session.startedAt)/1000),type,...payload});
}

function schedulePulse(){
  const cfg=JOURNEYS[G.journey];
  const min=Math.max(80,Math.min(cfg.pulseMin,G.tuning.rewardPulseSecMin));
  const max=Math.max(min+20,Math.min(cfg.pulseMax,G.tuning.rewardPulseSecMax));
  G.nextPulseAt = min + Math.random()*(max-min);
  G.pulseClock = 0;
}

function cycleJourney(step=1){
  const keys=Object.keys(JOURNEYS);
  const cur=keys.indexOf(G.journey);
  G.journey=keys[(cur+step+keys.length)%keys.length];
  G.session.journeysSwitched++;
  schedulePulse();
  logEvent('journey_switch',{journey:G.journey});
  notif(`旅程切換：${JOURNEYS[G.journey].label}`);
  updateHUD();
}

function cycleDrivePreset(step=1){
  const keys=Object.keys(DRIVE_PRESETS);
  const cur=keys.indexOf(G.drivePreset);
  G.drivePreset=keys[(cur+step+keys.length)%keys.length];
  G.session.presetsSwitched++;
  logEvent('drive_preset_switch',{preset:G.drivePreset,ab:G.driveAB});
  const rec = G.recommendedPreset===G.drivePreset ? '（符合推薦）' : `（建議 ${DRIVE_PRESETS[G.recommendedPreset].label}）`;
  notif(`操控切換：${DRIVE_PRESETS[G.drivePreset].label}（AB ${G.driveAB}）${rec}`);
  updateHUD();
}

// ─── QUESTS ──────────────────────────────────────────────────────────────────
let activeQ=[], doneQ=new Set();
const tierRot={ micro:new Set(), mid:new Set(), weekly:new Set() };

function pickWeightedMission(tier){
  let pool=MISSION_POOL[tier].filter(q=>!tierRot[tier].has(q.id)&&!activeQ.find(a=>a.id===q.id));
  if(!pool.length){
    // tier pool exhausted: allow a fresh rotation while still avoiding current active duplicates
    tierRot[tier].clear();
    pool=MISSION_POOL[tier].filter(q=>!activeQ.find(a=>a.id===q.id));
  }
  if(!pool.length) return null;
  const sum=pool.reduce((s,q)=>s+q.weight,0);
  let r=Math.random()*sum;
  for(const q of pool){
    r-=q.weight;
    if(r<=0) return {...q, tier};
  }
  return {...pool[pool.length-1], tier};
}

function initQ() {
  activeQ = [];
  ['micro','micro','mid','mid','weekly'].forEach(tier=>{
    const q=pickWeightedMission(tier);
    if(q) activeQ.push(q);
  });
  renderQ();
}
function checkQ() {
  let changed=false;
  for(let i=0;i<activeQ.length;i++){
    const q=activeQ[i];
    if(doneQ.has(q.id)) continue;
    if(q.check()){
      doneQ.add(q.id);
      tierRot[q.tier||'micro'].add(q.id);
      q.reward();
      changed=true;
      G.session.questsDone++;
      logEvent('quest_done',{id:q.id});
      if(q.tier==='micro') G.missionStats.microDone++;
      if(q.tier==='mid') G.missionStats.midDone++;
      if(q.tier==='weekly') G.missionStats.weeklyDone++;
      const nxt=pickWeightedMission(q.tier||'micro');
      if(nxt) activeQ[i]=nxt;
    }
  }
  if(changed) renderQ();
}

function calcRecommendedPreset(){
  const scores={casual:[],balanced:[],pro:[]};
  G.driveTestHistory.forEach(r=>{
    if(scores[r.preset]) scores[r.preset].push(r.total);
  });
  const avg=(arr)=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
  const ranked=Object.keys(scores).map(k=>({k,v:avg(scores[k]),n:scores[k].length}))
    .filter(x=>x.n>0)
    .sort((a,b)=>b.v-a.v||b.n-a.n);
  G.recommendedPreset = ranked.length?ranked[0].k:'balanced';
}

  return `${date.getUTCFullYear()}-W${String(week).padStart(2,'0')}`;
}

  G.trackTest.score=null;

function updateTrackTest(dt,steerInput,brakePressed){
  if(!G.trackTest.running) return;
  G.trackTest.elapsed += dt;
  G.trackTest.steeringSamples.push(Math.abs(steerInput));
  G.trackTest.speedSamples.push(Math.abs(car.speed*3.6));
  if(brakePressed&&Math.abs(car.speed)>16) G.trackTest.hardBrakeCount++;
  if(G.trackTest.elapsed>=G.trackTest.target){
    const profile=TRACK_TEST_MODES[G.trackTest.mode];
    const avgSpeed=G.trackTest.speedSamples.reduce((a,b)=>a+b,0)/Math.max(1,G.trackTest.speedSamples.length);
    const steerDelta=G.trackTest.steeringSamples.reduce((a,b)=>a+b,0)/Math.max(1,G.trackTest.steeringSamples.length);
    const steeringPredict=Math.max(0,100-Math.abs(steerDelta-profile.maxSteerDelta)*340);
    const brakingControl=Math.max(0,100-G.trackTest.hardBrakeCount*2.5);
    const speedFeel=Math.max(0,100-Math.abs(avgSpeed-profile.targetAvgKmh)*1.8);
    const motionComfort=Math.max(0,100-(steerDelta*120+G.trackTest.offroadCount*1.2));
    const total=Math.round((steeringPredict+brakingControl+speedFeel+motionComfort)/4);
    G.trackTest.score={
      total,
      steeringPredict:Math.round(steeringPredict),
      brakingControl:Math.round(brakingControl),
      speedFeel:Math.round(speedFeel),
      motionComfort:Math.round(motionComfort),
    };
    recordDrivingTestResult({
      ts:new Date().toISOString(),
      ab:G.driveAB,
      preset:G.drivePreset,
      mode:G.trackTest.mode,
      total:G.trackTest.score.total,
      steeringPredict:G.trackTest.score.steeringPredict,
      brakingControl:G.trackTest.score.brakingControl,
      speedFeel:G.trackTest.score.speedFeel,
      motionComfort:G.trackTest.score.motionComfort,
    });
    G.trackTest.running=false;
    notif(`測試完成：${profile.label} / 總分 ${total}`);
    logEvent('track_test_done',{mode:G.trackTest.mode,total});
    updateHUD();
  }
}

// ─── NOISE ────────────────────────────────────────────────────────────────────
function hash(x,y){const n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}
function sn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return THREE.MathUtils.lerp(THREE.MathUtils.lerp(hash(ix,iy),hash(ix+1,iy),ux),THREE.MathUtils.lerp(hash(ix,iy+1),hash(ix+1,iy+1),ux),uy);}
function fbm(x,y,o=5){let v=0,a=.5,f=1,s=0;for(let i=0;i<o;i++){v+=sn(x*f,y*f)*a;s+=a;a*=.5;f*=2.1;}return v/s;}
function th(x,z){return fbm(x*.016,z*.016)*24-5;}

// ─── ROAD ─────────────────────────────────────────────────────────────────────
const RW=7.5;
let roadPts=[],roadCurve=null,roadMesh=null,roadT=0;
let roadLastT=0.04;
const _probeV=new THREE.Vector3();

function seededRng(seed){
  const rng=new alea(seed+''); return ()=>rng.next();
}

function genPts(n,from,dir){
  let p=from?from.clone():new THREE.Vector3(),d=dir?dir.clone():new THREE.Vector3(0,0,-1);
  const pts=[p.clone()];
  for(let i=0;i<n;i++){
    d.applyEuler(new THREE.Euler(0,(Math.random()-.5)*.26,0)).normalize();
    const s=13+Math.random()*14;
    p=p.clone().addScaledVector(d,s);
    p.y=th(p.x,p.z)+.15;
    pts.push(p.clone());
  }
  return pts;
}

function buildRoadMesh(pts){
  const curve=new THREE.CatmullRomCurve3(pts);
  const div=pts.length*10;
  const cpts=curve.getPoints(div);
  const pos=[],idx=[],uvs=[];
  const N=new THREE.Vector3(0,1,0);
  for(let i=0;i<cpts.length;i++){
    const p=cpts[i];
    const tan=i<cpts.length-1?new THREE.Vector3().subVectors(cpts[i+1],p).normalize():new THREE.Vector3().subVectors(p,cpts[i-1]).normalize();
    const r=new THREE.Vector3().crossVectors(tan,N).normalize();
    const L=p.clone().addScaledVector(r,-RW/2),R=p.clone().addScaledVector(r,RW/2);
    pos.push(L.x,L.y+.07,L.z,R.x,R.y+.07,R.z);
    const u=i/cpts.length;
    uvs.push(0,u*14,1,u*14);
  }
  for(let i=0;i<cpts.length-1;i++){const a=i*2;idx.push(a,a+1,a+2,a+1,a+3,a+2);}
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(idx); geo.computeVertexNormals();

  // road surface: dark asphalt colour matching SR's dark road tone
  const mesh=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:0x2e2e2e}));
  mesh.receiveShadow=true;

  // centre dash line
  const lpos=[];
  for(let i=0;i<cpts.length;i++) lpos.push(cpts[i].x,cpts[i].y+.12,cpts[i].z);
  const lgeo=new THREE.BufferGeometry();
  lgeo.setAttribute('position',new THREE.Float32BufferAttribute(lpos,3));
  const line=new THREE.Line(lgeo,new THREE.LineBasicMaterial({color:0xd4d0c4,opacity:.4,transparent:true}));

  const g=new THREE.Group(); g.add(mesh); g.add(line);
  return g;
}

function initRoad(){
  roadPts=genPts(40,new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-1));
  rebuildRoad();
}
function rebuildRoad(){
  roadCurve=new THREE.CatmullRomCurve3(roadPts);
  if(roadMesh) scene.remove(roadMesh);
  roadMesh=buildRoadMesh(roadPts.slice(-75));
  scene.add(roadMesh);
}
function extendRoad(){
  const last=roadPts[roadPts.length-1],prev=roadPts[roadPts.length-2];
  const dir=new THREE.Vector3().subVectors(last,prev).normalize();
  const np=genPts(24,last,dir);
  roadPts.push(...np.slice(1));
  if(roadPts.length>160){roadPts=roadPts.slice(-130);roadT=Math.max(0,roadT-.25);}
  rebuildRoad();
}
function closestT(pos){
  // Local search around last best t to avoid O(120) scans every frame.
  const step=1/140;
  let best=roadLastT, bestD=Infinity;
  const start=Math.max(0,best-18*step), end=Math.min(1,best+18*step);
  for(let t=start;t<=end+1e-9;t+=step){
    const p=roadCurve.getPoint(t);
    const dx=pos.x-p.x, dz=pos.z-p.z;
    const d=dx*dx+dz*dz;
    if(d<bestD){bestD=d;best=t;}
  }
  roadLastT=best;
  return best;
}

function surfaceYAt(x,z){
  const terrainY=th(x,z)+.44;
  if(!roadCurve) return terrainY;
  _probeV.set(x,0,z);
  const t=closestT(_probeV);
  const rp=roadCurve.getPoint(t);
  const lateral=Math.hypot(x-rp.x,z-rp.z);
  if(lateral<RW*.78){
    // Keep car body on top of road mesh whenever we're on-road.
    return Math.max(terrainY,rp.y+.44);
  }
  return terrainY;
}

const TSIZE=200,TSEGS=46;
const terrMap=new Map(),scatMap=new Map();
const colMap=new Map();

function mkTerrain(cx,cz){
  const geo=new THREE.PlaneGeometry(TSIZE,TSIZE,TSEGS,TSEGS);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position,cols=[];
  for(let i=0;i<pos.count;i++){
    const wx=pos.getX(i)+cx*TSIZE,wz=pos.getZ(i)+cz*TSIZE,h=th(wx,wz);
    pos.setY(i,h);
    if(h<-1)      cols.push(.22,.44,.15);
    else if(h<4)  cols.push(.33,.57,.20);
    else if(h<10) cols.push(.43,.57,.25);
    else if(h<16) cols.push(.46,.44,.30);
    else           cols.push(.58,.56,.50);
  }
  pos.needsUpdate=true; geo.computeVertexNormals();
  geo.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
  const mesh=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({vertexColors:true}));
  mesh.position.set(cx*TSIZE,0,cz*TSIZE);
  mesh.receiveShadow=true;
  return mesh;
}

function mkTree(x,y,z,sc=1){

    c.position.y=(2.2+i*1.05)*sc; c.castShadow=true; g.add(c);
  }
  g.position.set(x,y,z); return g;
}

function mkRock(x,y,z,sc=1){
  const m=new THREE.Mesh(new THREE.DodecahedronGeometry((.65+Math.random()*.5)*sc,0),M.stone);
  m.position.set(x,y+.3*sc,z);
  m.rotation.set(Math.random()*2,Math.random()*2,Math.random()*2);
  m.castShadow=true; return m;
}

function mkLake(x,y,z,r){
  const m=new THREE.Mesh(new THREE.CircleGeometry(r,20),M.water);
  m.rotation.x=-Math.PI/2; m.position.set(x,y+.1,z); return m;
}

function mkCampsite(x,y,z){
  const g=new THREE.Group();
  for(let i=0;i<7;i++){const a=(i/7)*Math.PI*2; g.add(mkRock(x+Math.cos(a)*1.5,y,z+Math.sin(a)*1.5));}
  const tent=new THREE.Mesh(new THREE.ConeGeometry(2.3,3.0,4),M.tent);
  tent.rotation.y=Math.PI/4; tent.position.set(x+5,y+1.5,z); tent.castShadow=true;
  g.add(tent); return g;
}

function mkMarker(x,y,z,mat){
  const m=new THREE.Mesh(MKR_GEO,mat); m.position.set(x,y,z); return m;
}

function addCollider(list,x,z,r,type){
  list.push({x,z,r,type});
}

function chunkKey(cx,cz){ return `${cx},${cz}`; }
function getChunkCoords(x,z){ return {cx:Math.floor(x/TSIZE), cz:Math.floor(z/TSIZE)}; }

function addPOI(pois,pos,type,marker){
  pois.push({pos,type,marker});
}

function getNearbyColliders(){
  const {cx,cz}=getChunkCoords(car.pos.x,car.pos.z);
  const out=[];
  for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++){
    const k=chunkKey(cx+dx,cz+dz);
    const c=colMap.get(k);
    if(c) out.push(...c);
  }
  return out;
}

function resolveCarCollisions(){
  let hit=false;
  const near=getNearbyColliders();
  for(const c of near){
    const dx=car.pos.x-c.x, dz=car.pos.z-c.z;
    const minD=CAR_COL_RADIUS+c.r;
    const d2=dx*dx+dz*dz;
    if(d2<minD*minD){
      const d=Math.max(Math.sqrt(d2),0.0001);
      const push=(minD-d)+0.02;
      car.pos.x += (dx/d)*push;
      car.pos.z += (dz/d)*push;
      car.speed *= 0.35;
      hit=true;
    }
  }
  if(hit){
    G.physics.hitCount++;
    const now=Date.now();
    if(now-G.physics.lastHitAt>900){
      G.physics.lastHitAt=now;
      notif('碰撞！速度下降');
    }
  }
}

function applyRoadEdgePhysics(){
  if(!roadCurve) return;
  const t=closestT(car.pos);
  const rp=roadCurve.getPoint(t);
  const dx=car.pos.x-rp.x,dz=car.pos.z-rp.z;
  const lateral=Math.hypot(dx,dz);
  if(lateral>RW*.64){
    // Off-road friction and mild pullback toward road center.
    car.speed *= 0.965;
    const d=Math.max(lateral,0.0001);
    const pull=Math.min((lateral-RW*.64)*0.08,0.22);
    car.pos.x -= (dx/d)*pull;
    car.pos.z -= (dz/d)*pull;
  }
}

function scatter(cx,cz){
  const key=chunkKey(cx,cz);
  if(scatMap.has(key)) return;
  const rng=seededRng(cx*9973+cz*1009);
  const g=new THREE.Group();
  const colliders=[];
  const pois=[];
  const ox=cx*TSIZE,oz=cz*TSIZE;
  const biome=Math.floor(rng()*5);

  // trees everywhere (density varies)
  const nt=biome===0?30:biome===1?6:12;
  for(let i=0;i<nt;i++){
    const x=ox+(rng()-.5)*TSIZE,z=oz+(rng()-.5)*TSIZE;
    const sc=.7+rng()*.95;
    g.add(mkTree(x,th(x,z),z,sc));
    addCollider(colliders,x,z,0.65*sc,'tree');
  }

  if(biome===0){ // forest → chop POI
    const px=ox+(rng()-.5)*80,pz=oz+(rng()-.5)*80,py=th(px,pz);
    const mk=mkMarker(px,py+3.8,pz,M.mChop); g.add(mk);
    addPOI(pois,new THREE.Vector3(px,py,pz),'chop',mk);
  }
  if(biome===2){ // lake → fish POI
    const lx=ox+(rng()-.5)*80,lz=oz+(rng()-.5)*80,ly=th(lx,lz)-1.8;
    const lr=14+rng()*20;
    g.add(mkLake(lx,ly,lz,lr));
    for(let i=0;i<12;i++){const a=rng()*Math.PI*2,r=lr+2+rng()*14;const x=lx+Math.cos(a)*r,z=lz+Math.sin(a)*r;g.add(mkTree(x,th(x,z),z,.65+rng()*.7));}
    const mk=mkMarker(lx,ly+4,lz,M.mFish); g.add(mk);
    addPOI(pois,new THREE.Vector3(lx,ly,lz),'fish',mk);
  }
  if(biome===3){ // campsite → camp POI
    const cx2=ox+(rng()-.5)*80,cz2=oz+(rng()-.5)*80,cy=th(cx2,cz2);
    g.add(mkCampsite(cx2,cy,cz2));
    addCollider(colliders,cx2+5,cz2,1.4,'tent');
    for(let i=0;i<7;i++){
      const a=(i/7)*Math.PI*2;
      addCollider(colliders,cx2+Math.cos(a)*1.5,cz2+Math.sin(a)*1.5,0.65,'camp_rock');
    }
    for(let i=0;i<9;i++){const a=rng()*Math.PI*2,r=8+rng()*18;const x=cx2+Math.cos(a)*r,z=cz2+Math.sin(a)*r;g.add(mkTree(x,th(x,z),z,.8+rng()*.7));}
    const mk=mkMarker(cx2,cy+5,cz2,M.mCamp); g.add(mk);
    addPOI(pois,new THREE.Vector3(cx2,cy,cz2),'camp',mk);
  }
  if(biome===4){ // rocky → stone POI
    for(let i=0;i<18;i++){
      const x=ox+(rng()-.5)*TSIZE,z=oz+(rng()-.5)*TSIZE,sc=.9+rng()*.8;
      g.add(mkRock(x,th(x,z),z,sc));
      addCollider(colliders,x,z,0.55*sc,'rock');
    }
    const px=ox+(rng()-.5)*80,pz=oz+(rng()-.5)*80,py=th(px,pz);
    const mk=mkMarker(px,py+4,pz,M.mRock); g.add(mk);
    addPOI(pois,new THREE.Vector3(px,py,pz),'stone',mk);
  }

  scene.add(g); scatMap.set(key,g); colMap.set(key,colliders); poiMap.set(key,pois);
}

function updateTerrain(p){
  const cx=Math.floor(p.x/TSIZE),cz=Math.floor(p.z/TSIZE);
  const need=new Set();
  for(let dx=-2;dx<=2;dx++) for(let dz=-2;dz<=2;dz++){
    const k=chunkKey(cx+dx,cz+dz); need.add(k);
    if(!terrMap.has(k)){const c=mkTerrain(cx+dx,cz+dz);scene.add(c);terrMap.set(k,c);scatter(cx+dx,cz+dz);}
  }
  for(const [k,m] of terrMap) if(!need.has(k)){scene.remove(m);terrMap.delete(k);}
  for(const [k,g] of scatMap) if(!need.has(k)){scene.remove(g);scatMap.delete(k); colMap.delete(k); poiMap.delete(k);}
}

// ─── CAR PHYSICS ──────────────────────────────────────────────────────────────
function updateCar(dt){
  const cfg=DRIVE_PRESETS[G.drivePreset];
  const abMul=G.driveAB==='A'?1:.92;
  const maxS=28*G.up.speed*(G.drivePreset==='pro'?1.06:1);
  const fwd=keys.ArrowUp||keys.KeyW,back=keys.ArrowDown||keys.KeyS;
  const lft=keys.ArrowLeft||keys.KeyA,rgt=keys.ArrowRight||keys.KeyD;
  if(fwd)       car.speed=Math.min(car.speed+cfg.accel*abMul*dt,maxS);
  else if(back) car.speed=Math.max(car.speed-cfg.brake*dt,cfg.reverse);
  else          {car.speed*=(1-cfg.drag*dt);if(Math.abs(car.speed)<.05)car.speed=0;}
  const tr=(cfg.steer*(G.driveAB==='A'?1:1.05))*(1-Math.min(Math.abs(car.speed)/Math.max(maxS,.01),1)*.42);
  if(lft) car.yaw+=tr*dt*(car.speed>=0?1:-1);
  if(rgt) car.yaw-=tr*dt*(car.speed>=0?1:-1);
  const dir=new THREE.Vector3(Math.sin(car.yaw),0,Math.cos(car.yaw));
  const prevX=car.pos.x, prevZ=car.pos.z;
  const step=car.speed*dt;
  car.pos.addScaledVector(dir,step);
  resolveCarCollisions();
  applyRoadEdgePhysics();
  const dx=car.pos.x-prevX, dz=car.pos.z-prevZ;
  G.session.distanceKm += Math.hypot(dx,dz)/1000;
  car.pos.y=surfaceYAt(car.pos.x,car.pos.z);
  car.mesh.position.copy(car.pos); car.mesh.rotation.y=car.yaw;
  const ah=surfaceYAt(car.pos.x+dir.x*2,car.pos.z+dir.z*2),bh=surfaceYAt(car.pos.x-dir.x*2,car.pos.z-dir.z*2);
  car.mesh.rotation.x=Math.atan2(ah-bh,4)*.42;
  document.getElementById('speed-num').textContent=Math.abs(Math.round(car.speed*3.6));
  updateTrackTest(dt,(lft?1:0)+(rgt?1:0),back);
}

const camS=new THREE.Vector3(),camL=new THREE.Vector3();
function updateCam(dt){
  const d=new THREE.Vector3(Math.sin(car.yaw),0,Math.cos(car.yaw));
  const tgt=car.pos.clone().addScaledVector(d,-9).add(new THREE.Vector3(0,4.8,0));
  camS.lerp(tgt,6*dt); camera.position.copy(camS);
  camL.lerp(car.pos.clone().add(new THREE.Vector3(0,1,0)),9*dt); camera.lookAt(camL);
  sun.position.copy(camera.position).add(new THREE.Vector3(50,100,60));
  sun.target.position.copy(car.pos); sun.target.updateMatrixWorld();
}

const POI_LABEL={fish:'🎣 釣魚',chop:'🪓 砍樹',camp:'⛺ 露營',stone:'⛏ 採石'};
function updatePOI(t){
  let near=null,nd=Infinity;
  const {cx,cz}=getChunkCoords(car.pos.x,car.pos.z);
  for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++){
    const k=chunkKey(cx+dx,cz+dz);
    const list=poiMap.get(k);
    if(!list) continue;
    for(const p of list){
      const d=car.pos.distanceTo(p.pos);
      if(d<16&&d<nd){near=p;nd=d;}
      if(p.marker) p.marker.position.y=p.pos.y+3.8+Math.sin(t*2.4)*.28;
    }
  }
  G.nearPOI=near;
  const el=document.getElementById('interact-prompt');
  if(near&&!G.inMG){
    el.style.display='block';
    el.innerHTML=`<kbd>E</kbd> — ${POI_LABEL[near.type]}`;
  } else el.style.display='none';
}

  const upBase=G.economyCfg.upgradeBaseCost;
  const canUpHandling=G.wallet.coins>=(upBase*G.growth.handling)&&G.growth.handling<5;
  const canUpEfficiency=G.wallet.coins>=(upBase*G.growth.efficiency)&&G.growth.efficiency<5;
  const canUpStyle=G.wallet.coins>=(upBase*G.growth.style)&&G.growth.style<5;
  document.getElementById('mg-overlay').innerHTML=`
    <div class="mg-panel" style="min-width:380px;">
      <h2>⛺ 露營</h2>
      <p>背包：🪵${G.inv.wood} &nbsp;🐟${G.inv.fish} &nbsp;🍖${G.inv.food} &nbsp;🪨${G.inv.stone} &nbsp;🪙${G.wallet.coins}</p>
      ${hasFire?'<p style="color:var(--sr-warn);font-weight:500;font-size:.9rem;margin-bottom:.5rem;">🔥 火堆燃燒中</p>':''}
      <div style="display:flex;flex-direction:column;margin:.5rem 0;">
        <button class="camp-btn" id="b-fire" ${canF?'':'disabled'}>
          🔥 生火 <small>消耗木材 ×3${!canF?' — 木材不足':''}</small>
        </button>
        <button class="camp-btn" id="b-cook" ${canC?'':'disabled'}>
          🍖 烤魚 <small>消耗魚 ×1，需要火${!hasFire?' — 先生火':!canC?' — 沒有魚':''}</small>
        </button>
        <button class="camp-btn" id="b-rest" ${canR?'':'disabled'}>
          😴 過夜休息 <small>需要火${!hasFire?' — 先生火':''}</small>
        </button>
        <button class="camp-btn" id="b-craft" ${canCraft?'':'disabled'}>
          🔧 打造燧石 <small>石頭×2 + 木材×2${!canCraft?' — 材料不足':''}</small>
        </button>
        <button class="camp-btn" id="b-cw" ${canConvertWood?'':'disabled'}>
          💱 木材換硬幣 <small>木材×4 -> 硬幣×${G.economyCfg.woodToCoins}</small>
        </button>
        <button class="camp-btn" id="b-cs" ${canConvertStone?'':'disabled'}>
          💱 石頭換硬幣 <small>石頭×4 -> 硬幣×${G.economyCfg.stoneToCoins}</small>
        </button>
        <button class="camp-btn" id="b-uph" ${canUpHandling?'':'disabled'}>
          🧭 升級操控 <small>花費 ${upBase*G.growth.handling} 硬幣（Lv.${G.growth.handling} -> ${Math.min(5,G.growth.handling+1)}）</small>
        </button>
        <button class="camp-btn" id="b-upe" ${canUpEfficiency?'':'disabled'}>
          ⚙️ 升級效率 <small>花費 ${upBase*G.growth.efficiency} 硬幣（Lv.${G.growth.efficiency} -> ${Math.min(5,G.growth.efficiency+1)}）</small>
        </button>
        <button class="camp-btn" id="b-ups" ${canUpStyle?'':'disabled'}>
          🎨 升級風格 <small>花費 ${upBase*G.growth.style} 硬幣（Lv.${G.growth.style} -> ${Math.min(5,G.growth.style+1)}）</small>
        </button>
      </div>
      <div class="mg-result" id="camp-msg" style="min-height:1.4rem;"></div>
      <button class="mg-close" onclick="closeMG()">離開</button>
    </div>`;

  const msg=(t,c='var(--sr-primary)')=>{const el=document.getElementById('camp-msg');if(el){el.textContent=t;el.style.color=c;}};
  document.getElementById('b-fire').onclick=()=>{
    if(!canF)return; G.inv.wood-=3; hasFire=true; updateHUD(); checkQ();
    msg('篝火點燃，溫暖的光搖曳著…','var(--sr-warn)'); setTimeout(startCamping,700);
  };
  document.getElementById('b-cook').onclick=()=>{
    if(!canC)return; G.inv.fish--; G.inv.food++; updateHUD(); checkQ();
    msg('香噴噴的烤魚！','var(--sr-warn)'); setTimeout(startCamping,700);
  };
  document.getElementById('b-rest').onclick=()=>{
    if(!hasFire)return; G.camped=true; checkQ();
    msg('在篝火旁安然入睡，精神大振','#558');
  };
  document.getElementById('b-craft').onclick=()=>{
    if(!canCraft)return; G.inv.stone-=2; G.inv.wood-=2; G.inv.stone++; G.inv.wood++;
    updateHUD(); msg('打造完成（練習了手藝…）');
  };
  document.getElementById('b-cw').onclick=()=>{
    if(!canConvertWood)return; G.inv.wood-=4; G.wallet.coins+=G.economyCfg.woodToCoins; updateHUD(); msg(`換匯完成：硬幣 +${G.economyCfg.woodToCoins}`); setTimeout(startCamping,600);
  };
  document.getElementById('b-cs').onclick=()=>{
    if(!canConvertStone)return; G.inv.stone-=4; G.wallet.coins+=G.economyCfg.stoneToCoins; updateHUD(); msg(`換匯完成：硬幣 +${G.economyCfg.stoneToCoins}`); setTimeout(startCamping,600);
  };
  document.getElementById('b-uph').onclick=()=>{
    const cost=upBase*G.growth.handling; if(!canUpHandling)return; G.wallet.coins-=cost; G.growth.handling++; updateHUD(); msg('操控升級完成'); setTimeout(startCamping,600);
  };
  document.getElementById('b-upe').onclick=()=>{
    const cost=upBase*G.growth.efficiency; if(!canUpEfficiency)return; G.wallet.coins-=cost; G.growth.efficiency++; updateHUD(); msg('效率升級完成'); setTimeout(startCamping,600);
  };
  document.getElementById('b-ups').onclick=()=>{
    const cost=upBase*G.growth.style; if(!canUpStyle)return; G.wallet.coins-=cost; G.growth.style++; updateHUD(); msg('風格升級完成'); setTimeout(startCamping,600);
  };
}

// ─── ROAD EXTENSION ───────────────────────────────────────────────────────────
function checkRoad(){
  if(!roadCurve)return;
  roadT=closestT(car.pos);
  if(roadT>.65) extendRoad();
}

function updateRetention(dt){
  G.pulseClock += dt;
  if(G.pulseClock >= G.nextPulseAt){
    JOURNEYS[G.journey].pulseReward();
    G.wallet.coins += G.economyCfg.pulseCoinBase + G.growth.efficiency;
    G.session.pulses++;
    G.journeyXP += 12;
    if(G.journey==='collect') G.journeyXP += 2;
    if(G.journeyXP >= G.lvl*40){
      G.journeyXP = 0;
      G.lvl++;
      notif(`旅程升級 Lv.${G.lvl}`);
      logEvent('journey_level_up',{lvl:G.lvl});
    }
    logEvent('pulse_reward',{journey:G.journey,pulses:G.session.pulses});
    schedulePulse();
    if(G.session.pulses>=5&&G.tuning.rewardPulseSecMin>95){
      // KPI 調優：早期回饋頻率逐步提高
      G.tuning.rewardPulseSecMin -= 5;
      G.tuning.rewardPulseSecMax -= 5;
    }
    updateHUD();
    saveKPI();
  }
  refreshChallengeProgress();
  if(G.challengeOpen) renderChallengePanel();
}

function saveKPI(){
  const key='road-trip-kpi-history';
  const sec=Math.round((Date.now()-G.session.startedAt)/1000);
  const snapshot={
    ts:new Date().toISOString(),
    sec,
    distanceKm:+G.session.distanceKm.toFixed(2),
    pulses:G.session.pulses,
    shares:G.session.shares,
    journeysSwitched:G.session.journeysSwitched,
    presetsSwitched:G.session.presetsSwitched,
    questsDone:G.session.questsDone,
    challengeDone:G.session.challengeDone,
    coins:G.wallet.coins,
    trackScore:G.trackTest.score?G.trackTest.score.total:null,
  };
  let hist=[];
  try{ hist=JSON.parse(localStorage.getItem(key)||'[]'); }catch(_e){ hist=[]; }
  hist.push(snapshot);
  localStorage.setItem(key,JSON.stringify(hist.slice(-20)));
}

window.addEventListener('beforeunload',()=>{ saveKPI(); saveProgress(); });

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  loadProgress();
  ensureWeeklyReset();
  loadDrivingTestHistory();
  calcRecommendedPreset();
  initRoad(); initQ(); updateHUD();
  schedulePulse();
  if(!G.challenge.active.length) initWeeklyChallenges();
  logEvent('session_start',{journey:G.journey,drivePreset:G.drivePreset,ab:G.driveAB});
  if(roadCurve){const sp=roadCurve.getPoint(.04);car.pos.copy(sp);car.pos.y=th(sp.x,sp.z)+.6;}
  camS.copy(car.pos).add(new THREE.Vector3(0,5,10));
  camL.copy(car.pos);
  notif(`AB 測試：操控 ${G.driveAB} 已啟用`);
  const kpiBtn=document.getElementById('btn-export-kpi');
  if(kpiBtn) kpiBtn.onclick=exportKPICSV;
  const resetBtn=document.getElementById('btn-reset-save');
  if(resetBtn) resetBtn.onclick=()=>{
    if(confirm('確定要重置所有存檔與統計嗎？')) resetAllProgress();
  };
  updateHUD();
}

function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05),t=clock.elapsedTime;
  if(!G.inMG) updateCar(dt);
  updateRetention(dt);
  G.autosaveClock += dt;
  if(G.autosaveClock>5){ G.autosaveClock=0; saveProgress(); }
  updateTerrain(car.pos); updatePOI(t); updateCam(dt);
  renderer.render(scene,camera);
  if(!G.inMG) checkRoad();
  if(G.kpiOpen) renderKPI();
  if(G.challengeOpen) renderChallengePanel();
}

init(); loop();

window.addEventListener('error',(e)=>{
  showFatalOverlay('執行錯誤', `${e.message||'unknown error'} @ ${e.filename?e.filename.split('/').pop():'index.html'}:${e.lineno||0}`);
});
window.addEventListener('unhandledrejection',(e)=>{
  const msg=(e.reason&&e.reason.message)?e.reason.message:String(e.reason||'promise rejected');
  showFatalOverlay('非預期錯誤', msg);
});
</script>
